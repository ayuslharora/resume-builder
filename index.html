  <script>
    (() => {
      const authRoutes = {
        '/login': {
          title: 'Log in to ResuMe',
          description: 'Log in to your ResuMe workspace.',
          robots: 'noindex,follow',
        },
        '/signup': {
          title: 'Create a ResuMe account',
          description: 'Create your ResuMe account and start building better resumes.',
          robots: 'noindex,follow',
        },
      };

      const routeSeo = authRoutes[window.location.pathname];
      document.documentElement.dataset.route = window.location.pathname;
      if (!routeSeo) return;

      const upsert = (selector, tagName, attributes, textContent) => {
        let node = document.head.querySelector(selector);
        if (!node) {
          node = document.createElement(tagName);
          document.head.appendChild(node);
        }

        Object.entries(attributes).forEach(([name, value]) => {
          node.setAttribute(name, value);
        });

        if (textContent !== undefined) {
          node.textContent = textContent;
        }
      };

      document.title = routeSeo.title;
      upsert('meta[name="description"]', 'meta', { name: 'description', content: routeSeo.description });
      upsert('meta[name="robots"]', 'meta', { name: 'robots', content: routeSeo.robots });
      upsert('link[rel="canonical"]', 'link', {
        rel: 'canonical',
        href: new URL(window.location.pathname, window.location.origin).toString(),
      });
      upsert('meta[property="og:type"]', 'meta', { property: 'og:type', content: 'website' });
      upsert('meta[property="og:site_name"]', 'meta', { property: 'og:site_name', content: 'ResuMe' });
      upsert('meta[property="og:title"]', 'meta', { property: 'og:title', content: routeSeo.title });
      upsert('meta[property="og:description"]', 'meta', { property: 'og:description', content: routeSeo.description });
      upsert('meta[property="og:url"]', 'meta', {
        property: 'og:url',
        content: new URL(window.location.pathname, window.location.origin).toString(),
      });
      upsert('meta[property="og:image"]', 'meta', {
        property: 'og:image',
        content: 'https://resume.ayuslh.in/social-preview.png',
      });
      upsert('meta[name="twitter:card"]', 'meta', { name: 'twitter:card', content: 'summary_large_image' });
      upsert('meta[name="twitter:title"]', 'meta', { name: 'twitter:title', content: routeSeo.title });
      upsert('meta[name="twitter:description"]', 'meta', { name: 'twitter:description', content: routeSeo.description });
      upsert('meta[name="twitter:image"]', 'meta', {
        name: 'twitter:image',
        content: 'https://resume.ayuslh.in/social-preview.png',
      });

      const structuredData = document.head.querySelector('script[type="application/ld+json"]');
      if (structuredData) {
        structuredData.textContent = '';
      }
    })();
  </script>
  <style>
    html[data-route="/"],

      background-attachment: scroll;
    }

    html[data-route="/"]:has(body[data-theme="dark"]),
    html[data-route="/"] body[data-theme="dark"] {
      background: #000000;
    }

    html[data-route]:not([data-route="/"]),
    html[data-route]:not([data-route="/"]) body {
      background: #ffffff;
      background-image: none;
      background-attachment: scroll;
    }

    html[data-route]:not([data-route="/"]):has(body[data-theme="dark"]),
    html[data-route]:not([data-route="/"]) body[data-theme="dark"] {
      background: #000000;
    }

    html[data-route="/"] #root {
      display: none;
    }

    html[data-route]:not([data-route="/"]) #homepage-static-shell {
      display: none;
    }
  </style>

<body>
  <script>
    (function() {
      try {
        var theme = localStorage.getItem("app-theme");
        var accent = localStorage.getItem("app-accent");
        if (theme === "dark") document.body.setAttribute("data-theme", "dark");
        if (accent) document.body.setAttribute("data-accent", accent);
      } catch(e) {}
    })();
  </script>
